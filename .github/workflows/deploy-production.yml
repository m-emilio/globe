# Optional CI deploy of production Worker `globe` from main.
# Requires GitHub Actions secrets (see README / list below).
name: Deploy production globe

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TRANSIT_PUBLICAPI_V4: ${{ secrets.TRANSIT_PUBLICAPI_V4 }}
      TRANSIT_REQUIRE_PAYMENT: ${{ secrets.TRANSIT_REQUIRE_PAYMENT }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      STRIPE_PAYMENT_LINK_URL: ${{ secrets.STRIPE_PAYMENT_LINK_URL }}
      STRIPE_MIN_AMOUNT_CENTS: ${{ secrets.STRIPE_MIN_AMOUNT_CENTS }}
      STRIPE_SUCCESS_URL: ${{ secrets.STRIPE_SUCCESS_URL }}
      STRIPE_CANCEL_URL: ${{ secrets.STRIPE_CANCEL_URL }}
      ADMIN_ACTION_SECRET: ${{ secrets.ADMIN_ACTION_SECRET }}
      ADMIN_FINGERPRINTS: ${{ secrets.ADMIN_FINGERPRINTS }}
      ADMIN_USER_IDS: ${{ secrets.ADMIN_USER_IDS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: |
          npx tsc --project src/client --noEmit
          npx tsc --project src/server --noEmit

      - name: Deploy production Worker globe
        if: env.CF_API_TOKEN != '' && env.CF_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          command: deploy --name globe
          secrets: |
            TRANSIT_PUBLICAPI_V4
            TRANSIT_REQUIRE_PAYMENT
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            STRIPE_PUBLISHABLE_KEY
            STRIPE_PAYMENT_LINK_URL
            STRIPE_MIN_AMOUNT_CENTS
            STRIPE_SUCCESS_URL
            STRIPE_CANCEL_URL
            ADMIN_ACTION_SECRET
            ADMIN_FINGERPRINTS
            ADMIN_USER_IDS

      - name: Skip deploy note
        if: env.CF_API_TOKEN == '' || env.CF_ACCOUNT_ID == ''
        run: |
          echo "CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — production deploy skipped."
          echo "Typecheck passed. Production is already deployable via: npx wrangler deploy --name globe"
